<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#FFB7C5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />

    <title>旅遊手帳</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
      :root {
        --handbook-beige: #FFF8E7;
      }
      body, html {
        margin: 0;
        padding: 0;
        background-color: var(--handbook-beige); 
        font-family: 'Zen Maru Gothic', sans-serif;
        -webkit-tap-highlight-color: transparent; 
        overscroll-behavior-y: none; 
        height: 100%;
        overflow-x: hidden;
      }

      /* 🌸 Splash Screen 啟動畫面設定 (M1-3) */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--handbook-beige);
        background-image: url('/splash.jpeg');
        background-size: cover;
        background-position: center;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }

      /* 當 React 載入完成後會隱藏啟動畫面 */
      .app-loaded #splash-screen {
        opacity: 0;
        visibility: hidden;
      }

      /* 🛡️ Debug / Safety Render 區初始隱藏 (M7-4) */
      #safety-render-zone {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen"></div>

    <div id="root"></div>

    <div id="safety-render-zone">🌸Tiffany & Benjamin🌸</div>
    
    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener('load', () => {
        // 給予一點緩衝時間讓畫面更像原生 App 動效
        setTimeout(() => {
          document.body.classList.add('app-loaded');
        }, 1500);
      });
    </script>
  </body>
</html>
